<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Painel do Barbeiro</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/painel.css" />
  </head>

  <body>
    <header class="position-absolute top-0 w-100 p-3 z-3">
      <div
        class="container d-flex flex-column flex-md-row justify-content-between align-items-center"
      >
        <h3 class="text-white">💈 Barbearia</h3>

        <nav class="nav">
          <a class="nav-link text-white" href="inicio.html">Início</a>

          <a class="nav-link text-white" href="index.html">Agendar</a>

          <a class="nav-link text-white" href="login.html">Barbeiro</a>
        </nav>
      </div>
    </header>

    <main
      class="container min-vh-100 d-flex justify-content-center align-items-center py-5"
    >
      <div class="panel-container shadow-lg">
        <div class="panel-header">
          <h1>Painel</h1>

          <button onclick="logout()" class="btn btn-warning">Sair</button>
        </div>

        <h3 id="barberName"></h3>

        <input
          type="date"
          id="date"
          class="form-control"
          onchange="loadAppointments()"
        />

        <div id="list"></div>
      </div>
    </main>

    <script src="scripts/painel.js"></script>
  </body>
</html>
