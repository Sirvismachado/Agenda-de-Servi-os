<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Login Barbeiro</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/login.css" />
  </head>

  <body>
    <header class="position-absolute top-0 w-100 p-3 z-3">
      <div
        class="container d-flex flex-column flex-md-row justify-content-between align-items-center"
      >
        <h3 class="text-white">💈 Barbearia</h3>

        <nav class="nav">
          <a class="nav-link text-white" href="inicio.html">Início</a>

          <a class="nav-link text-white" href="index.html">Agendar</a>

          <a class="nav-link text-white" href="login.html">Barbeiro</a>
        </nav>
      </div>
    </header>

    <main
      class="container min-vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="login-container shadow-lg">
        <h2 class="mb-4">Login do Barbeiro</h2>

        <div class="mb-3">
          <label class="form-label">Usuário</label>

          <input type="text" id="user" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Senha</label>

          <input type="password" id="pass" class="form-control" />
        </div>

        <button onclick="login()" class="btn btn-warning w-100">Entrar</button>
      </div>
    </main>

    <script src="scripts/login.js"></script>
  </body>
</html>
