<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Agendamento Barbearia</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="position-absolute top-0 w-100 p-3 z-3">
      <div
        class="container d-flex flex-column flex-md-row justify-content-between align-items-center"
      >
        <h3 class="text-white">💈 Barbearia</h3>

        <nav class="nav">
          <a class="nav-link text-white" href="inicio.html">Início</a>

          <a class="nav-link text-white" href="index.html">Agendar</a>

          <a class="nav-link text-white" href="login.html">Barbeiro</a>
        </nav>
      </div>
    </header>

    <main
      class="container min-vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="card shadow-lg p-4 form-container">
        <h1 class="text-center mb-4">Agendar</h1>

        <div class="mb-3">
          <label class="form-label">Barbeiro</label>

          <select id="barber" class="form-select">
            <option value="1">Mário</option>
            <option value="2">Leandro</option>
            <option value="3">Cleber</option>
            <option value="4">João</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Serviço</label>

          <select id="service" class="form-select">
            <option value="1">Corte (30min)</option>

            <option value="2">Corte e Barba (60min)</option>

            <option value="3">Barba (15min)</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Data</label>

          <input type="date" id="date" class="form-control" />
        </div>

        <button onclick="loadAvailability()" class="btn btn-warning w-100">
          Ver horários
        </button>

        <div id="slots" class="mt-4"></div>
      </div>
    </main>

    <script src="scripts/index.js"></script>
  </body>
</html>
